<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 620" width="400" height="620">
  <style>
    .outline { fill: none; stroke: #000000; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
    .thin { fill: none; stroke: #000000; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .detail { fill: none; stroke: #000000; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .screw { fill: none; stroke: #000000; stroke-width: 2; }
  </style>

  <!-- Device body - rounded rectangle, portrait -->
  <rect x="40" y="30" width="320" height="540" rx="16" ry="16" class="outline"/>

  <!-- Inner bezel / edge lip -->
  <rect x="52" y="42" width="296" height="516" rx="10" ry="10" class="detail"/>

  <!-- Screen area - top ~65% of device body -->
  <rect x="72" y="65" width="256" height="330" rx="4" ry="4" class="outline"/>

  <!-- Screen inner border -->
  <rect x="80" y="73" width="240" height="314" rx="2" ry="2" class="thin"/>

  <!-- Click wheel - centered below screen, tighter to screen -->
  <!-- Outer ring -->
  <circle cx="200" cy="470" r="62" class="outline"/>
  <!-- Inner ring -->
  <circle cx="200" cy="470" r="46" class="thin"/>
  <!-- Center button -->
  <circle cx="200" cy="470" r="18" class="thin"/>
  <!-- Center dot -->
  <circle cx="200" cy="470" r="4" fill="#000000" stroke="none"/>

  <!-- Directional tick marks on click wheel -->
  <line x1="200" y1="411" x2="200" y2="420" class="detail"/>
  <line x1="200" y1="520" x2="200" y2="529" class="detail"/>
  <line x1="141" y1="470" x2="150" y2="470" class="detail"/>
  <line x1="250" y1="470" x2="259" y2="470" class="detail"/>

  <!-- SMA antenna connectors - bottom edge, 3 posts -->
  <!-- Left SMA -->
  <rect x="88" y="560" width="18" height="32" rx="3" ry="3" class="thin"/>
  <circle cx="97" cy="592" r="5" class="detail"/>

  <!-- Center SMA -->
  <rect x="191" y="560" width="18" height="32" rx="3" ry="3" class="thin"/>
  <circle cx="200" cy="592" r="5" class="detail"/>

  <!-- Right SMA -->
  <rect x="294" y="560" width="18" height="32" rx="3" ry="3" class="thin"/>
  <circle cx="303" cy="592" r="5" class="detail"/>

  <!-- Top-left antenna SMA -->
  <rect x="52" y="2" width="18" height="30" rx="3" ry="3" class="thin"/>
  <circle cx="61" cy="2" r="5" class="detail"/>

  <!-- Corner screws -->
  <circle cx="60" cy="48" r="6" class="screw"/>
  <circle cx="60" cy="48" r="2.5" fill="#000000" stroke="none"/>

  <circle cx="340" cy="48" r="6" class="screw"/>
  <circle cx="340" cy="48" r="2.5" fill="#000000" stroke="none"/>

  <circle cx="60" cy="552" r="6" class="screw"/>
  <circle cx="60" cy="552" r="2.5" fill="#000000" stroke="none"/>

  <circle cx="340" cy="552" r="6" class="screw"/>
  <circle cx="340" cy="552" r="2.5" fill="#000000" stroke="none"/>

  <!-- USB-C port - right side -->
  <rect x="358" y="260" width="8" height="24" rx="3" ry="3" class="detail"/>

  <!-- Small side buttons - right side -->
  <rect x="358" y="170" width="6" height="16" rx="2" ry="2" class="detail"/>
  <rect x="358" y="200" width="6" height="16" rx="2" ry="2" class="detail"/>

  <!-- Left side - SD card slot -->
  <rect x="36" y="190" width="6" height="20" rx="2" ry="2" class="detail"/>

</svg>
